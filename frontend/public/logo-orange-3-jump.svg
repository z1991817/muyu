<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="oDots" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="#FF6B2C"/>
      <circle cx="3.5" cy="3.5" r="1.3" fill="#1A1714" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="240" height="240" fill="#FFF4D6" rx="16"/>
  <!-- 向下的速度线（鱼向上跳，线从尾部向下拖） -->
  <g stroke="#1A1714" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="105" y1="196" x2="103" y2="220"/>
    <line x1="120" y1="200" x2="120" y2="225"/>
    <line x1="135" y1="196" x2="137" y2="220"/>
  </g>
  <!-- 尾鳍 -->
  <path d="M 105 168 L 84 192 L 118 172 L 152 192 L 135 168 Z"
        fill="url(#oDots)" stroke="#1A1714" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- 左鳍（张开，蓝） -->
  <path d="M 82 108 L 40 84 L 80 124 Z"
        fill="#2540D9" stroke="#1A1714" stroke-width="3" stroke-linejoin="round"/>
  <!-- 右鳍（张开，蓝） -->
  <path d="M 158 108 L 200 84 L 160 124 Z"
        fill="#2540D9" stroke="#1A1714" stroke-width="3" stroke-linejoin="round"/>
  <!-- 鱼身（竖直） -->
  <path d="M 120 52 Q 158 60 162 100 Q 164 138 142 162
           L 152 172 L 120 158 L 88 172 L 98 162
           Q 78 138 80 100 Q 84 60 120 52 Z"
        fill="url(#oDots)" stroke="#1A1714" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- 眼（偏右，3/4 视角） -->
  <circle cx="133" cy="80" r="11" fill="#1A1714"/>
  <path d="M 131 74 L 132.5 78 L 136 79 L 132.5 80 L 131 84 L 129.5 80 L 126 79 L 129.5 78 Z" fill="#FFF4D6"/>
  <!-- 笑 -->
  <path d="M 112 98 Q 122 105 132 98" fill="none" stroke="#1A1714" stroke-width="2.8" stroke-linecap="round"/>
  <!-- 腮红 -->
  <circle cx="114" cy="90" r="5" fill="#FFC93C" opacity="0.7"/>
  <!-- 头顶爆点 -->
  <g transform="translate(120 42)">
    <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z"
          fill="#FFC93C" stroke="#1A1714" stroke-width="2"/>
  </g>
  <text x="120" y="233" font-family="monospace" font-size="12" fill="#1A1714" text-anchor="middle" opacity="0.45">③ 跳跃</text>
</svg>
