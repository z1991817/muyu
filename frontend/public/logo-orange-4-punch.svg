<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="oDots" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="#FF6B2C"/>
      <circle cx="3.5" cy="3.5" r="1.3" fill="#1A1714" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="240" height="240" fill="#FFF4D6" rx="16"/>
  <!-- 冲击爆点 -->
  <g transform="translate(208 52)">
    <path d="M 0 -14 L 4 -4 L 14 0 L 4 4 L 0 14 L -4 4 L -14 0 L -4 -4 Z"
          fill="#FFC93C" stroke="#1A1714" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <!-- 速度线 -->
  <g stroke="#1A1714" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="18" y1="148" x2="50" y2="136"/>
    <line x1="28" y1="170" x2="56" y2="160"/>
    <line x1="38" y1="192" x2="62" y2="182"/>
  </g>
  <g transform="rotate(-18 115 110)">
    <!-- 尾鳍 -->
    <path d="M 50 88 L 10 66 L 40 100 L 10 134 L 50 116 Z"
          fill="url(#oDots)" stroke="#1A1714" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- 背鳍（蓝） -->
    <path d="M 105 72 L 125 48 L 142 70 Z"
          fill="#2540D9" stroke="#1A1714" stroke-width="3" stroke-linejoin="round"/>
    <!-- 鱼身 -->
    <path d="M 200 86 Q 214 76 204 64 Q 180 50 145 56 Q 100 64 72 82
             Q 52 94 50 104 Q 52 116 72 126 Q 105 136 148 132
             Q 182 128 202 116 Q 214 106 200 86 Z"
          fill="url(#oDots)" stroke="#1A1714" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- 出拳鳍（向前伸出，蓝） -->
    <path d="M 190 82 L 240 62 L 195 72 Z"
          fill="#2540D9" stroke="#1A1714" stroke-width="3" stroke-linejoin="round"/>
    <!-- 收回的鳍（小，蓝） -->
    <path d="M 130 118 L 138 138 L 148 118 Z"
          fill="#2540D9" stroke="#1A1714" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 眼（怒目） -->
    <circle cx="180" cy="86" r="10" fill="#1A1714"/>
    <path d="M 178 80 L 179.5 84 L 183 85 L 179.5 86 L 178 90 L 176.5 86 L 173 85 L 176.5 84 Z" fill="#FFF4D6"/>
    <!-- 怒眉 -->
    <line x1="172" y1="74" x2="186" y2="78" stroke="#1A1714" stroke-width="3" stroke-linecap="round"/>
    <!-- 嘴（咧嘴冲） -->
    <path d="M 192 100 Q 200 106 208 100" fill="none" stroke="#1A1714" stroke-width="2.8" stroke-linecap="round"/>
  </g>
  <text x="120" y="233" font-family="monospace" font-size="12" fill="#1A1714" text-anchor="middle" opacity="0.45">④ 出拳</text>
</svg>
