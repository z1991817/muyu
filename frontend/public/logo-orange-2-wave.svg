<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="oDots" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="#FF6B2C"/>
      <circle cx="3.5" cy="3.5" r="1.3" fill="#1A1714" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="240" height="240" fill="#FFF4D6" rx="16"/>
  <!-- 挥手弧线 -->
  <g fill="none" stroke="#1A1714" stroke-width="2" stroke-linecap="round">
    <path d="M 148 36 Q 160 26 170 36"/>
    <path d="M 146 50 Q 160 40 174 50"/>
  </g>
  <g transform="rotate(-5 120 118)">
    <!-- 尾鳍 -->
    <path d="M 55 106 L 18 80 L 46 110 L 18 142 L 55 128 Z"
          fill="url(#oDots)" stroke="#1A1714" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- 举起的鳍（高高挥手，蓝色） -->
    <path d="M 118 90 L 136 38 L 154 86 Z"
          fill="#2540D9" stroke="#1A1714" stroke-width="3" stroke-linejoin="round"/>
    <!-- 鱼身 -->
    <path d="M 192 108 Q 208 92 198 78 Q 174 62 136 70 Q 96 76 68 94
             Q 50 106 50 118 Q 50 130 68 138 Q 98 152 138 146
             Q 178 140 196 126 Q 208 118 192 108 Z"
          fill="url(#oDots)" stroke="#1A1714" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- 胸鳍（蓝） -->
    <path d="M 140 134 L 155 155 L 167 134 Z"
          fill="#2540D9" stroke="#1A1714" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 眼 -->
    <circle cx="175" cy="92" r="11" fill="#1A1714"/>
    <path d="M 173 86 L 174.5 90 L 178 91 L 174.5 92 L 173 96 L 171.5 92 L 168 91 L 171.5 90 Z" fill="#FFF4D6"/>
    <!-- 笑 -->
    <path d="M 185 110 Q 193 115 200 110" fill="none" stroke="#1A1714" stroke-width="2.8" stroke-linecap="round"/>
    <!-- 腮红 -->
    <circle cx="161" cy="111" r="5" fill="#FFC93C" opacity="0.7"/>
    <!-- 鳍尖爆点 -->
    <g transform="translate(136 38)">
      <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z"
            fill="#FFC93C" stroke="#1A1714" stroke-width="2"/>
    </g>
  </g>
  <text x="120" y="233" font-family="monospace" font-size="12" fill="#1A1714" text-anchor="middle" opacity="0.45">② 挥手</text>
</svg>
