name: CI/CD Pipeline

permissions:
  contents: write
  id-token: write  # Required for trusted publishing to PyPI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x64 build (ABI3 supports Python 3.9+)
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            maturin-target: x86_64-unknown-linux-gnu
          # Linux arm64 build (ABI3 supports Python 3.9+)
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            maturin-target: aarch64-unknown-linux-gnu
          # Windows x64 build (ABI3 supports Python 3.9+)
          - os: windows-2025
            platform: windows
            arch: x64
            maturin-target: x86_64-pc-windows-msvc
          # Windows arm64 build (ABI3 supports Python 3.9+)
          - os: windows-11-arm
            platform: windows
            arch: arm64
            maturin-target: aarch64-pc-windows-msvc
          # macOS x64 build (ABI3 supports Python 3.9+)
          - os: macos-15-intel
            platform: macos
            arch: x64
            maturin-target: x86_64-apple-darwin
          # macOS arm64 build (ABI3 supports Python 3.9+)
          - os: macos-15
            platform: macos
            arch: arm64
            maturin-target: aarch64-apple-darwin

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.maturin-target }}

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxml2-dev libxslt1-dev wget gnupg pkg-config libssl-dev

    - name: Install LLVM
      if: matrix.os == 'ubuntu-24.04' || matrix.os == 'ubuntu-24.04-arm'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y lld-21

    - name: Install LLVM (macOS)
      if: matrix.os == 'macos-15' || matrix.os == 'macos-15-intel'
      run: |
        brew install llvm@21 nasm pkg-config openssl@3

    - name: Install LLVM (Windows)
      if: matrix.os == 'windows-2025' || matrix.os == 'windows-11-arm'
      run: |
        winget install LLVM.LLVM --accept-source-agreements --accept-package-agreements -e

    - name: Install vcpkg and OpenSSL (Windows)
      if: matrix.os == 'windows-2025' || matrix.os == 'windows-11-arm'
      shell: bash
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        ./bootstrap-vcpkg.bat
        # 根据架构安装对应的 OpenSSL
        if [ "${{ matrix.arch }}" = "x64" ]; then
          ./vcpkg install openssl:x64-windows
          echo "OPENSSL_DIR=$GITHUB_WORKSPACE/vcpkg/installed/x64-windows" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$GITHUB_WORKSPACE/vcpkg/installed/x64-windows/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$GITHUB_WORKSPACE/vcpkg/installed/x64-windows/include" >> $GITHUB_ENV
        else
          ./vcpkg install openssl:arm64-windows
          echo "OPENSSL_DIR=$GITHUB_WORKSPACE/vcpkg/installed/arm64-windows" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$GITHUB_WORKSPACE/vcpkg/installed/arm64-windows/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$GITHUB_WORKSPACE/vcpkg/installed/arm64-windows/include" >> $GITHUB_ENV
        fi
        echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> $GITHUB_ENV

    - name: Set LLVM environment variables (macOS)
      if: matrix.os == 'macos-15' || matrix.os == 'macos-15-intel'
      run: |
        # Apple Silicon 使用 /opt/homebrew，Intel 使用 /usr/local
        if [ "$(uname -m)" = "arm64" ]; then
          HOMEBREW_PREFIX="/opt/homebrew"
        else
          HOMEBREW_PREFIX="/usr/local"
        fi
        echo "$HOMEBREW_PREFIX/opt/llvm@21/bin" >> $GITHUB_PATH
        echo "LLVM_HOME=$HOMEBREW_PREFIX/opt/llvm@21" >> $GITHUB_ENV
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV
        echo "AR=$HOMEBREW_PREFIX/opt/llvm@21/bin/llvm-ar" >> $GITHUB_ENV
        echo "NM=$HOMEBREW_PREFIX/opt/llvm@21/bin/llvm-nm" >> $GITHUB_ENV
        echo "RANLIB=$HOMEBREW_PREFIX/opt/llvm@21/bin/llvm-ranlib" >> $GITHUB_ENV
        echo "LDFLAGS=-L$HOMEBREW_PREFIX/opt/llvm@21/lib -L$HOMEBREW_PREFIX/opt/openssl@3/lib" >> $GITHUB_ENV
        echo "CPPFLAGS=-I$HOMEBREW_PREFIX/opt/llvm@21/include -I$HOMEBREW_PREFIX/opt/openssl@3/include" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=$HOMEBREW_PREFIX/opt/openssl@3/lib/pkgconfig" >> $GITHUB_ENV
        echo "OPENSSL_DIR=$HOMEBREW_PREFIX/opt/openssl@3" >> $GITHUB_ENV
        echo "OPENSSL_LIB_DIR=$HOMEBREW_PREFIX/opt/openssl@3/lib" >> $GITHUB_ENV
        echo "OPENSSL_INCLUDE_DIR=$HOMEBREW_PREFIX/opt/openssl@3/include" >> $GITHUB_ENV
        echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV
        echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

    - name: Set LLVM environment variables (Windows)
      if: matrix.os == 'windows-2025' || matrix.os == 'windows-11-arm'
      run: |
        echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

    - name: Verify LLVM installation
      shell: bash
      run: |
        echo "Checking clang version..."
        clang --version || echo "clang not found"
        echo "Checking llvm-config..."
        llvm-config --version || echo "llvm-config not found"

    - name: Install dependencies
      run: |
        pip install maturin setuptools wheel build
        # 安装用于静态类型检查的类型存根
        pip install types-PyYAML types-decorator types-tabulate

    - name: Build seesea-core with maturin
      shell: bash
      run: |
        # 为特定目标架构构建（使用ABI3，支持Python 3.9+）
        cd seesea-core && maturin build --release --strip --target ${{ matrix.maturin-target }}
        mkdir -p ../building
        # 复制wheel文件（wheel可能在 target/{target}/wheels/ 或 target/wheels/ 目录下）
        find . -name "*.whl" -path "*/wheels/*" -exec cp {} ../building/ \;

    - name: Build seesea Python package
      shell: bash
      run: |
        # 设置临时Python环境用于构建seesea SDK
        python -m pip install --upgrade pip build
        cd seesea && python -m build --wheel
        cp dist/*.whl ../building/

    - name: List generated files
      shell: bash
      run: ls -la building/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: seesea-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.run_id }}
        path: building/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: false

    - name: Collect All Build Files
      run: |
        mkdir -p building
        # 复制所有平台的产物到 building 目录
        find artifacts -name "*.whl" -exec cp {} building/ \;
        # 去重（不同平台可能有相同的 seesea-*.whl 文件）
        cd building
        # 列出所有文件
        echo "=== All collected files ==="
        ls -la

    - name: List Release Files
      run: |
        echo "=== Files to be released ==="
        ls -la building/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          building/*.whl
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # PyPI 发布 seesea-core（Rust 核心库）
  pypi-publish-core:
    name: Publish seesea-core to PyPI
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/seesea-core

    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: false

    - name: Collect seesea-core wheels
      run: |
        mkdir -p dist
        find artifacts -name "seesea_core-*.whl" -exec cp {} dist/ \;
        echo "=== seesea-core wheels ==="
        ls -la dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/

  # PyPI 发布 seesea（Python SDK）
  pypi-publish-sdk:
    name: Publish seesea to PyPI
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/seesea

    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: false

    - name: Collect seesea SDK wheel (only need one copy)
      run: |
        mkdir -p dist
        # seesea SDK 是纯 Python，所以所有平台的 wheel 相同，只需要一个
        find artifacts -name "seesea-*.whl" ! -name "seesea_core-*" | head -1 | xargs -I {} cp {} dist/
        echo "=== seesea SDK wheel ==="
        ls -la dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/

  lint:
    name: Rust Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Run Clippy
      run: |
        cd seesea-core && cargo clippy --all-features -- -D warnings

    - name: Run Rustfmt
      run: |
        cd seesea-core && cargo fmt --all --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run Security Audit
      run: |
        cd seesea-core && cargo audit --ignore RUSTSEC-2025-0057 --ignore RUSTSEC-2024-0384 --ignore RUSTSEC-2025-0119

  python-lint:
    name: Python Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy
        pip install types-requests types-openpyxl types-xlrd types-defusedxml
        pip install numpy

    - name: Run Black
      working-directory: .
      run: black --check .

    - name: Run Ruff
      working-directory: ./seesea
      run: ruff check .

    - name: Run Mypy
      working-directory: ./seesea
      run: mypy .
