# SeeSea 调度器配置文件
# 路径: 
# Windows: D:\Program Files\SeeSea\config\scheduler.toml
# Linux/macOS: ~/.seesea/config/scheduler.toml

[scheduler]
# 是否启用调度器
enabled = true

# 工作线程数
worker_threads = 4

# 默认日期策略
# - current: 使用当前日期
# - last_trading_day: 使用最近交易日
# - specified: 使用指定日期
# - last_workday: 使用上一个工作日
default_date_strategy = "last_trading_day"

[scheduler.trading_days]
# 交易日数据源
data_source = "api"

# 交易日缓存路径（留空则使用默认路径）
# Windows: D:\Program Files\SeeSea\cache\trading_days
# Linux/macOS: ~/.seesea/cache/trading_days
cache_path = ""

# 缓存过期时间（小时）
cache_ttl_hours = 24

# 是否启用节假日跳过
skip_holidays = true

# 任务配置列表
[[scheduler.tasks]]
name = "A股代码名称"
task_type = "stock_info_a_code_name"
enabled = true
date_strategy = "current"
# custom_interval = 3600  # 可选：自定义间隔（秒）

