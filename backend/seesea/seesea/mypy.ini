[mypy]
# Basic settings
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
exclude = ^build/
ignore_missing_imports = True

# Ignore specific external dependencies without type stubs
[mypy-seesea_core]
ignore_missing_imports = True
follow_imports = skip

# Ignore markitdown module errors
[mypy-markitdown]
ignore_missing_imports = True
follow_imports = skip

# Ignore Playwright-related errors when not available
[mypy-playwright.*]
ignore_missing_imports = True
follow_imports = skip

# Ignore rich library type errors
[mypy-rich.*]
ignore_missing_imports = True
follow_imports = skip

# Ignore specific errors in browser modules
[mypy-seesea.embeddings]
ignore_errors = True

[mypy-seesea.browser.*]
ignore_errors = True

# Ignore return type errors from external calls
[mypy-seesea.rss]
warn_return_any = False

[mypy-seesea.search]
warn_return_any = False

[mypy-seesea.config]
warn_return_any = False

[mypy-seesea.api]
warn_return_any = False
