services:
  seesea:
    build:
      context: ..
      dockerfile: ops/seesea.Dockerfile
    image: moyu-seesea:latest
    ports:
      - "${MOYU_SEESEA_PORT:-127.0.0.1:18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5).status==200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 240s
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: moyu-api:latest
    environment:
      SEESEA_BASE_URL: http://seesea:8080
      SEESEA_STOCK_SDK_FALLBACK_ENABLED: ${SEESEA_STOCK_SDK_FALLBACK_ENABLED:-false}
      UMAMI_API_BASE: ${UMAMI_API_BASE:-https://api.umami.is/v1}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-5ed62d5d-3114-49cb-85b7-491c0cf277c1}
      UMAMI_API_KEY: ${UMAMI_API_KEY:-}
    ports:
      - "${MOYU_API_PORT:-127.0.0.1:18000}:8000"
    volumes:
      - moyu_api_data:/app/data
    depends_on:
      seesea:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).status==200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  cn-market-refresh:
    image: moyu-api:latest
    environment:
      SEESEA_BASE_URL: http://seesea:8080
      SEESEA_STOCK_SDK_FALLBACK_ENABLED: "true"
      CACHE_DB_PATH: /app/data/cache.db
    volumes:
      - moyu_api_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    command: >
      python -c "from app.jobs.refresh_cn_market import loop_main; loop_main()"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        API_BASE: http://api:8000/api
    image: moyu-frontend:latest
    environment:
      API_BASE: http://api:8000/api
      TZ: Asia/Shanghai  
    ports:
      - "${MOYU_FRONTEND_PORT:-127.0.0.1:14321}:4321"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4321/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 300s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${MOYU_NGINX_PORT:-127.0.0.1:18081}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  moyu_api_data:
