version: "3.9"

services:
  seesea:
    image: python:3.12-slim
    working_dir: /workspace/backend/seesea/seesea
    command: >-
      sh -c "pip install --no-cache-dir seesea-core>=2.0.4 && pip install --no-cache-dir -e . && seesea server --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    volumes:
      - ../backend:/workspace/backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/hot/platforms', timeout=5).status==200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  api:
    image: python:3.12-slim
    working_dir: /workspace/backend
    command: >-
      sh -c "pip install --no-cache-dir . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      SEESEA_BASE_URL: http://seesea:8080
      PYTHONPATH: /workspace/backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/workspace/backend
    depends_on:
      seesea:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).status==200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: >-
      sh -c "corepack enable && pnpm install --frozen-lockfile=false && pnpm build && HOST=0.0.0.0 PORT=4321 node dist/server/entry.mjs"
    environment:
      PUBLIC_API_BASE: http://api:8000/api
    ports:
      - "4321:4321"
    volumes:
      - ../frontend:/workspace/frontend
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4321/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
